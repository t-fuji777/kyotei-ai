name: train
on:
  workflow_dispatch:
concurrency:
  group: data
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas numpy lightgbm
      - name: train model
        run: python scripts/train.py
      - name: commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/model docs/model_report.json
          git diff --cached --quiet || git commit -m "train model"
          git pull --rebase --autostash
          git push
