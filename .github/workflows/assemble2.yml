name: assemble-from-run
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "artifact source run id"
        required: true
        default: "27384380405"
      start:
        description: "fan start YYYYMMDD"
        required: true
        default: "20210611"
concurrency:
  group: data
  cancel-in-progress: false
permissions:
  contents: write
  actions: read
jobs:
  assemble:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install lhafile
      - uses: actions/download-artifact@v4
        with:
          pattern: entries-*
          path: data/races/
          merge-multiple: true
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: fetch fan data
        run: python scripts/fetch_fan.py --start ${{ github.event.inputs.start }}
      - name: commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/races data/fan
          git diff --cached --quiet || git commit -m "assemble from run ${{ github.event.inputs.run_id }}"
          git pull --rebase
          git push
